<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Setup | SavvyMoney</title>
    <style>
        :root {
            --primary-bg: #050b2d;
            --container-bg: #192f5a;
            --accent-color: #6c5ce7;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --text-white: #ffffff;
            --input-bg: #f4f7fe;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 50px 50px;
            color: var(--text-white);
        }

        .container {
            background-color: var(--container-bg);
            padding: 40px;
            border-radius: 20px;
            width: 80%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        p {
            color: #b2bec3;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: #d1d1d1;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: none;
            background-color: var(--input-bg);
            color: #2d3436;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: 2px solid var(--accent-color);
        }

        h3 {
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
            font-weight: 400;
        }

        #todo-container {
            margin-bottom: 15px;
        }

        .todo-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .delete-btn {
            background-color: var(--danger-color);
            color: white;
            border: none;
            border-radius: 8px;
            width: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .delete-btn:hover {
            background-color: #c0392b;
        }

        .add-btn {
            background-color: var(--success-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            transition: 0.2s;
        }

        .add-btn:hover {
            background-color: #219150;
        }

        .submit-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .submit-btn:hover {
            background-color: #5b4cc4;
            transform: translateY(-2px);
        }

        /* Chrome, Safari, Edge, Opera - Remove arrows from number input */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Setup Budget</h2>
    <p>Configure your wallet to start tracking</p>

    <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="username" placeholder="e.g. Tony">
    </div>

    <div class="form-group">
        <label>Monthly Income / Total Budget (₦)</label>
        <input type="number" id="budget" placeholder="0.00">
    </div>

    <div class="form-group">
        <label>Savings Goal (₦)</label>
        <input type="number" id="savings" placeholder="How much do you want to save?">
    </div>

    <div class="form-group">
        <label>Duration (Weeks)</label>
        <input type="number" id="weeks" placeholder="e.g. 4">
    </div>

    <h3>Financial To-Do List</h3>
    <div id="todo-container"></div>
    <button class="add-btn" onclick="addTodo()">+ Add New Task</button>

    <button class="submit-btn" onclick="saveData()">Initialize Dashboard</button>
</div>

<script>
    const container = document.getElementById("todo-container");

    // Initialize one default task field
    function createTodo(value = "") {
        const div = document.createElement("div");
        div.classList.add("todo-item");

        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "e.g. Pay Electricity Bill";
        input.value = value;

        const del = document.createElement("button");
        del.innerHTML = "✕";
        del.classList.add("delete-btn");

        del.onclick = () => {
            if (container.children.length > 1) {
                div.remove();
            } else {
                alert("You need at least one goal or task!");
            }
        };

        div.appendChild(input);
        div.appendChild(del);
        container.appendChild(div);
    }

    function addTodo() {
        createTodo();
    }

    function saveData() {
        const username = document.getElementById("username").value;
        const budget = document.getElementById("budget").value;
        const savings = document.getElementById("savings").value;
        const weeks = document.getElementById("weeks").value;

        if (!username || !budget || !weeks) {
            alert("Please fill in all the required fields.");
            return;
        }

        const todos = [];
        document.querySelectorAll(".todo-item input").forEach(input => {
            if (input.value.trim() !== "") {
                todos.push({ text: input.value, done: false });
            }
        });

        // Construct updated data object to match new dashboard layout
        const userData = {
            username,
            budget: parseFloat(budget),
            savings: parseFloat(savings) || 0,
            weeks,
            balance: parseFloat(budget),
            expenses: [],
            todos
        };

        localStorage.setItem("userData", JSON.stringify(userData));
        window.location.href = "dashboard.html";
    }

    // Start with one task input by default
    createTodo();
</script>

</body>
</html>
